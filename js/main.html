<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة XO</title>
  <link rel="stylesheet" href="main.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">
    <h1 class="game-title">لعبة <span class="highlight">XO</span></h1>

    <div class="turn-indicator" id="turn-indicator">
      الدور: <span id="current-player" class="player-x">X</span>
    </div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <div class="footer">
      <button class="btn" id="restart-btn">إعادة اللعبة</button>
    </div>
  </div>

  <!-- Result Modal -->
  <div id="result-modal" class="modal">
    <div class="modal-content">
      <h2 id="result-message"></h2>
      <button class="btn" id="new-game-btn">لعبة جديدة</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>

</html>
